<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dev Front-End</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
}

/* MATRIX */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* LOGIN */

#loginPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#0d1117;
padding:40px;
border-radius:12px;
width:320px;
box-shadow:0 0 20px #00ff9d;
text-align:center;
}

.login-box h1{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
background:#161b22;
border:1px solid #30363d;
border-radius:6px;
color:white;
}

button{
padding:12px;
background:#00ff9d;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

#mensagem{
margin-top:10px;
color:#ff6b6b;
}

/* SITE */

#site{
display:none;
}

header{
background:#161b22;
padding:15px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

section{
padding:60px;
text-align:center;
}

h1{
color:#00ff9d;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
}

.card{
background:#161b22;
padding:20px;
border-radius:10px;
width:200px;
box-shadow:0 0 10px rgba(0,255,150,0.3);
}

textarea{
width:80%;
height:200px;
background:black;
color:#00ff9d;
font-family:monospace;
}

iframe{
width:80%;
height:200px;
background:white;
margin-top:20px;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<h1>DevLogin</h1>

<input type="text" id="user" placeholder="Usuário">

<input type="password" id="pass" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="mensagem"></p>

</div>

</div>

<!-- SITE -->

<div id="site">

<header>

<h2>DevAprender</h2>

<nav>
<a href="#home">Home</a>
<a href="#cursos">Cursos</a>
<a href="#projetos">Projetos</a>
<a href="#editor">Editor</a>
</nav>

</header>

<section id="home">

<h1>Aprenda Programação</h1>
<p>HTML • CSS • JavaScript</p>

</section>

<section id="cursos">

<h1>Cursos</h1>

<div class="container">

<div class="card" onclick="abrirCurso('html')">HTML Básico</div>
<div class="card" onclick="abrirCurso('css')">CSS Básico</div>
<div class="card" onclick="abrirCurso('js')">JavaScript</div>

</div>

</section>

<section id="projetos">

<h1>Projetos para aprender</h1>

<div class="container">

<div class="card" onclick="abrirProjeto('calculadora')">Calculadora</div>
<div class="card" onclick="abrirProjeto('relogio')">Relógio Digital</div>
<div class="card" onclick="abrirProjeto('jogo')">Jogo da Velha</div>

</div>

</section>

<section id="editor">

<h1>Editor de Código</h1>

<textarea id="codigo">

<h1>Olá mundo</h1>

</textarea>

<br><br>

<button onclick="executar()">Executar</button>

<br>

<iframe id="resultado"></iframe>

</section>

</div>

<script>

/* LOGIN */

function login(){

let usuario = document.getElementById("user").value
let senha = document.getElementById("pass").value

if(usuario === "dev" && senha === "123"){

document.getElementById("loginPage").style.display = "none"
document.getElementById("site").style.display = "block"

}
else{

document.getElementById("mensagem").innerText =
"Usuário ou senha incorretos"

}

}

/* EDITOR */

function executar(){

let codigo = document.getElementById("codigo").value
document.getElementById("resultado").srcdoc = codigo

}

/* MATRIX */

const canvas = document.getElementById("matrix")
const ctx = canvas.getContext("2d")

canvas.height = window.innerHeight
canvas.width = window.innerWidth

const letras = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ"
const arrayLetras = letras.split("")

const tamanhoFonte = 16
const colunas = canvas.width / tamanhoFonte

const gotas = []

for(let x = 0; x < colunas; x++)
gotas[x] = 1

function desenhar(){

ctx.fillStyle = "rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle = "#00ff9d"
ctx.font = tamanhoFonte + "px monospace"

for(let i = 0; i < gotas.length; i++){

const texto = arrayLetras[Math.floor(Math.random()*arrayLetras.length)]

ctx.fillText(texto, i*tamanhoFonte, gotas[i]*tamanhoFonte)

if(gotas[i]*tamanhoFonte > canvas.height && Math.random() > 0.975)
gotas[i] = 0

gotas[i]++

}

}

setInterval(desenhar,33)

function abrirCurso(curso){

if(curso === "html"){
alert("Curso HTML: Aprenda a criar páginas web.")
}

if(curso === "css"){
alert("Curso CSS: Aprenda a estilizar sites.")
}

if(curso === "js"){
alert("Curso JavaScript: Aprenda a programar para web.")
}

}

function abrirProjeto(projeto){

if(projeto === "calculadora"){
alert("Projeto: Criar uma calculadora com JavaScript.")
}

if(projeto === "relogio"){
alert("Projeto: Criar um relógio digital.")
}

if(projeto === "jogo"){
alert("Projeto: Criar um jogo da velha.")
}

}

</script>

</body>
</html>
